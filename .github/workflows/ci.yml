name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: build-and-test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Security audit
        run: bun run security:audit

      - name: Build & type-check
        run: bun run build

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Install Playwright browsers (Linux)
        if: runner.os == 'Linux'
        run: node ./node_modules/@playwright/test/cli.js install --with-deps chromium

      - name: Install Playwright browsers (Windows)
        if: runner.os == 'Windows'
        run: node ./node_modules/@playwright/test/cli.js install chromium

      - name: Smoke / e2e
        run: bun run test:e2e

      - name: Accessibility smoke
        run: bun run test:a11y

  android-debug-build:
    name: android-debug-build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .node-version

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Install Android SDK packages
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDKMANAGER" --licenses >/dev/null
          "$SDKMANAGER" "platforms;android-36" "build-tools;36.0.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web assets
        run: bun run build

      - name: Sync Capacitor Android
        run: bun x cap sync android

      - name: Build Android debug APK
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug
